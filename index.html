<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trojanisches Pferd - Survival</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow: hidden;
        }

        .game-container {
            display: flex;
            height: 100vh;
        }

        #gameCanvas {
            flex: 1;
            background: linear-gradient(135deg, #1a3a1a 0%, #0a2a0a 100%);
            cursor: crosshair;
        }

        .sidebar {
            width: 280px;
            background: #1a1a1a;
            border-left: 3px solid #ffd700;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .sidebar h2 {
            color: #ffd700;
            font-size: 1.2em;
            margin-bottom: 15px;
            border-bottom: 2px solid #ffd700;
            padding-bottom: 10px;
        }

        .stat {
            margin: 10px 0;
            padding: 8px;
            background: rgba(255, 215, 0, 0.1);
            border-left: 3px solid #ffd700;
            border-radius: 3px;
        }

        .stat-label {
            font-size: 0.85em;
            color: #aaa;
        }

        .stat-value {
            font-size: 1.3em;
            color: #ffd700;
            font-weight: bold;
        }

        .phase-display {
            background: rgba(255, 100, 100, 0.2);
            border: 2px solid #ff6464;
            border-radius: 5px;
            padding: 10px;
            text-align: center;
            margin: 10px 0;
            font-weight: bold;
        }

        .phase-display.phase1 {
            background: rgba(100, 150, 255, 0.2);
            border-color: #6496ff;
        }

        .phase-display.phase2 {
            background: rgba(100, 255, 150, 0.2);
            border-color: #64ff96;
        }

        .phase-display.phase3 {
            background: rgba(255, 150, 100, 0.2);
            border-color: #ff9664;
        }

        .objective {
            background: rgba(255, 215, 0, 0.1);
            border-left: 3px solid #ffd700;
            padding: 10px;
            margin: 10px 0;
            font-size: 0.85em;
            border-radius: 3px;
        }

        .game-over-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
        }

        .game-over-content {
            background: rgba(26, 26, 46, 0.95);
            padding: 40px;
            border-radius: 15px;
            border: 3px solid #ffd700;
        }

        .game-over-content h1 {
            font-size: 3em;
            color: #ffd700;
            margin-bottom: 20px;
        }

        .game-over-content p {
            font-size: 1.2em;
            margin: 10px 0;
        }

        .game-over-content button {
            margin-top: 20px;
            padding: 15px 30px;
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            color: #000;
            border: none;
            border-radius: 5px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 150px;
                padding: 10px;
            }

            .sidebar h2 {
                font-size: 1em;
            }

            .stat-value {
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
        <div class="sidebar">
            <div>
                <h2>🐴 TROJANER</h2>
                <div class="phase-display" id="phaseDisplay">PHASE 1: SAMMLE HOLZ</div>
                
                <div class="stat">
                    <div class="stat-label">PHASE</div>
                    <div class="stat-value" id="phaseStat">1/3</div>
                </div>
                <div class="stat">
                    <div class="stat-label">HOLZ</div>
                    <div class="stat-value" id="woodStat">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">BÄUME</div>
                    <div class="stat-value" id="treesStat">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">PUNKTE</div>
                    <div class="stat-value" id="scoreStat">0</div>
                </div>
                <div class="stat" id="guardStatBox">
                    <div class="stat-label">WACHEN</div>
                    <div class="stat-value" id="guardsStat">0</div>
                </div>

                <div class="objective" id="objective">
                    Tippe auf die Bäume um Holz zu sammeln!
                </div>
            </div>
        </div>
    </div>

    <div class="game-over-overlay" id="gameOverOverlay">
        <div class="game-over-content">
            <h1 id="gameOverTitle">SPIEL VORBEI</h1>
            <p id="gameOverMessage">Nachricht</p>
            <p id="gameOverScore">Punkte: 0</p>
            <button onclick="location.reload()">NOCHMAL SPIELEN</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth - 280;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Game phases
        const PHASES = {
            BUILDING: 1,
            ESCAPING: 2,
            ATTACKING: 3
        };

        // Game variables
        let gameRunning = true;
        let gameTime = 0;
        let player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            width: 20,
            height: 20,
            speed: 5,
            kills: 0
        };

        let game = {
            score: 0,
            phase: PHASES.BUILDING,
            wood: 0,
            horseBuildProgress: 0,
            horseMaxWood: 100,
            guards: 0,
            gameOverReason: ''
        };

        let horse = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            width: 80,
            height: 100,
            radius: 100,
            health: 100
        };

        let trees = [];
        let guards = [];
        let particles = [];
        let mouse = { x: 0, y: 0 };

        // Create trees
        function createTrees() {
            trees = [];
            for (let i = 0; i < 8; i++) {
                let x, y, valid;
                do {
                    valid = true;
                    x = 100 + Math.random() * (canvas.width - 500);
                    y = 100 + Math.random() * (canvas.height - 200);
                    
                    const dist = Math.sqrt((x - horse.x) ** 2 + (y - horse.y) ** 2);
                    if (dist < 200) valid = false;
                } while (!valid);

                trees.push({
                    x: x,
                    y: y,
                    width: 40,
                    height: 50,
                    wood: 1,
                    taps: 0,
                    maxTaps: 3
                });
            }
        }

        // Spawn guards
        function spawnGuards() {
            guards = [];
            const count = 4;
            for (let i = 0; i < count; i++) {
                const angle = (i / count) * Math.PI * 2;
                guards.push({
                    x: horse.x + Math.cos(angle) * 300,
                    y: horse.y + Math.sin(angle) * 300,
                    width: 20,
                    height: 20,
                    speed: 2.5,
                    targetX: horse.x,
                    targetY: horse.y
                });
            }
            game.guards = guards.length;
        }

        // Input handling
        let keys = {};
        document.addEventListener('keydown', (e) => keys[e.key] = true);
        document.addEventListener('keyup', (e) => keys[e.key] = false);
        
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
        });

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const clickY = e.clientY - rect.top;

            if (game.phase === PHASES.BUILDING) {
                // Check trees
                trees.forEach((tree, idx) => {
                    const dist = Math.sqrt((clickX - tree.x) ** 2 + (clickY - tree.y) ** 2);
                    if (dist < 30) {
                        tree.taps++;
                        game.wood += tree.wood;
                        spawnParticles(tree.x, tree.y, 3);
                        if (tree.taps >= tree.maxTaps) {
                            trees.splice(idx, 1);
                        }
                    }
                });

                // Check horse
                const horseDist = Math.sqrt((clickX - horse.x) ** 2 + (clickY - horse.y) ** 2);
                if (horseDist < 60 && game.wood >= 10) {
                    game.wood -= 10;
                    game.horseBuildProgress += 10;
                    spawnParticles(horse.x, horse.y, 5);
                    
                    if (game.horseBuildProgress >= game.horseMaxWood) {
                        startPhase2();
                    }
                }
            } else if (game.phase === PHASES.ATTACKING) {
                // Shooting
                guards.forEach((guard, idx) => {
                    const dist = Math.sqrt((clickX - guard.x) ** 2 + (clickY - guard.y) ** 2);
                    if (dist < 25) {
                        guards.splice(idx, 1);
                        game.score += 10;
                        player.kills++;
                        spawnParticles(guard.x, guard.y, 5);
                    }
                });
            }
        });

        function startPhase2() {
            game.phase = PHASES.ESCAPING;
            spawnGuards();
            horse.health = 100;
        }

        function startPhase3() {
            game.phase = PHASES.ATTACKING;
            spawnGuards();
        }

        // Particles
        function spawnParticles(x, y, count) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 4,
                    vy: (Math.random() - 0.5) * 4,
                    life: 30,
                    maxLife: 30,
                    color: Math.random() > 0.5 ? '#ffd700' : '#ffff00'
                });
            }
        }

        // Update
        function update() {
            if (!gameRunning) return;

            gameTime++;

            // Phase 1
            if (game.phase === PHASES.BUILDING) {
                // Player movement
                let moveX = 0;
                let moveY = 0;
                if (keys['ArrowUp'] || keys['w']) moveY -= player.speed;
                if (keys['ArrowDown'] || keys['s']) moveY += player.speed;
                if (keys['ArrowLeft'] || keys['a']) moveX -= player.speed;
                if (keys['ArrowRight'] || keys['d']) moveX += player.speed;

                player.x = Math.max(0, Math.min(canvas.width, player.x + moveX));
                player.y = Math.max(0, Math.min(canvas.height, player.y + moveY));
            }

            // Phase 2 - Escaping
            if (game.phase === PHASES.ESCAPING) {
                // Player movement
                let moveX = 0;
                let moveY = 0;
                if (keys['ArrowUp'] || keys['w']) moveY -= player.speed;
                if (keys['ArrowDown'] || keys['s']) moveY += player.speed;
                if (keys['ArrowLeft'] || keys['a']) moveX -= player.speed;
                if (keys['ArrowRight'] || keys['d']) moveX += player.speed;

                player.x = Math.max(0, Math.min(canvas.width, player.x + moveX));
                player.y = Math.max(0, Math.min(canvas.height, player.y + moveY));

                // Check if in horse circle
                const playerDist = Math.sqrt((player.x - horse.x) ** 2 + (player.y - horse.y) ** 2);
                const inHorse = playerDist < horse.radius;

                // Guard AI
                guards.forEach(guard => {
                    const dx = player.x - guard.x;
                    const dy = player.y - guard.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist > 0) {
                        guard.x += (dx / dist) * guard.speed;
                        guard.y += (dy / dist) * guard.speed;
                    }

                    // Catch player
                    if (Math.sqrt((guard.x - player.x) ** 2 + (guard.y - player.y) ** 2) < 25) {
                        if (!inHorse) {
                            endGame(false, 'Du wurdest erwischt! Game Over!');
                        }
                    }
                });

                // Check if all guards defeated while in horse
                if (guards.length === 0 && inHorse) {
                    startPhase3();
                }
            }

            // Phase 3 - Attacking
            if (game.phase === PHASES.ATTACKING) {
                // Player movement
                let moveX = 0;
                let moveY = 0;
                if (keys['ArrowUp'] || keys['w']) moveY -= player.speed;
                if (keys['ArrowDown'] || keys['s']) moveY += player.speed;
                if (keys['ArrowLeft'] || keys['a']) moveX -= player.speed;
                if (keys['ArrowRight'] || keys['d']) moveX += player.speed;

                player.x = Math.max(0, Math.min(canvas.width, player.x + moveX));
                player.y = Math.max(0, Math.min(canvas.height, player.y + moveY));

                // Guard AI
                guards.forEach(guard => {
                    const dx = player.x - guard.x;
                    const dy = player.y - guard.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist > 0) {
                        guard.x += (dx / dist) * guard.speed;
                        guard.y += (dy / dist) * guard.speed;
                    }

                    // Hit player
                    if (Math.sqrt((guard.x - player.x) ** 2 + (guard.y - player.y) ** 2) < 20) {
                        endGame(false, 'Du wurdest besiegt!');
                    }
                });

                // Win condition
                if (gameTime > 600 && guards.length === 0) {
                    endGame(true, 'Troy ist erobert! Du hast gewonnen!');
                }
            }

            // Update particles
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                return p.life > 0;
            });

            updateUI();
        }

        // Draw
        function draw() {
            ctx.fillStyle = 'rgba(26, 0, 51, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw horse
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(horse.x - 40, horse.y - 50, 80, 100);
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 50px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🐴', horse.x, horse.y - 10);

            // Draw horse circle (Phase 2)
            if (game.phase === PHASES.ESCAPING) {
                ctx.strokeStyle = 'rgba(0, 255, 0, 0.3)';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(horse.x, horse.y, horse.radius, 0, Math.PI * 2);
                ctx.stroke();

                const playerDist = Math.sqrt((player.x - horse.x) ** 2 + (player.y - horse.y) ** 2);
                if (playerDist < horse.radius) {
                    ctx.fillStyle = 'rgba(0, 255, 0, 0.1)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }
            }

            // Draw trees
            trees.forEach(tree => {
                ctx.fillStyle = '#228B22';
                ctx.fillRect(tree.x - 20, tree.y - 25, 40, 50);
                ctx.fillStyle = '#00aa00';
                ctx.fillRect(tree.x - 25, tree.y - 30, 50, 15);
                
                // Show taps
                ctx.fillStyle = '#ffd700';
                ctx.font = 'bold 14px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(tree.taps + '/' + tree.maxTaps, tree.x, tree.y);
            });

            // Draw player
            ctx.fillStyle = '#00ff00';
            ctx.fillRect(player.x - 10, player.y - 10, 20, 20);
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 12px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('👤', player.x, player.y);

            // Draw guards
            guards.forEach(guard => {
                ctx.fillStyle = '#ff3333';
                ctx.fillRect(guard.x - 10, guard.y - 10, 20, 20);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 12px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('⚔️', guard.x, guard.y);
            });

            // Draw particles
            particles.forEach(p => {
                ctx.fillStyle = `${p.color}${Math.floor((p.life / p.maxLife) * 255).toString(16).padStart(2, '0')}`;
                ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
            });

            // Draw phase info
            ctx.fillStyle = '#ffd700';
            ctx.font = 'bold 24px Arial';
            ctx.textAlign = 'center';
            
            let phaseText = 'PHASE 1: SAMMLE HOLZ';
            let buildProgress = '';
            if (game.phase === PHASES.BUILDING) {
                phaseText = 'PHASE 1: BAUE DAS PFERD';
                buildProgress = `Holz: ${game.wood} | Fortschritt: ${Math.floor((game.horseBuildProgress / game.horseMaxWood) * 100)}%`;
            } else if (game.phase === PHASES.ESCAPING) {
                phaseText = 'PHASE 2: BLEIB IM PFERD!';
                buildProgress = `Wachen: ${guards.length}`;
            } else if (game.phase === PHASES.ATTACKING) {
                phaseText = 'PHASE 3: BESIEGE ALLE WACHEN!';
                buildProgress = `Wachen: ${guards.length}`;
            }
            
            ctx.fillText(phaseText, canvas.width / 2, 40);
            ctx.font = 'bold 16px Arial';
            ctx.fillText(buildProgress, canvas.width / 2, 70);
        }

        function updateUI() {
            document.getElementById('phaseStat').textContent = `${game.phase}/3`;
            document.getElementById('woodStat').textContent = game.wood;
            document.getElementById('treesStat').textContent = trees.length;
            document.getElementById('scoreStat').textContent = game.score;
            document.getElementById('guardsStat').textContent = guards.length;

            const phaseDisplay = document.getElementById('phaseDisplay');
            phaseDisplay.className = 'phase-display';

            if (game.phase === PHASES.BUILDING) {
                phaseDisplay.className += ' phase1';
                phaseDisplay.textContent = '🌳 PHASE 1: SAMMLE HOLZ';
                document.getElementById('objective').textContent = 'Tippe auf Bäume um Holz zu sammeln, dann klick auf das Pferd!';
                document.getElementById('guardStatBox').style.display = 'none';
            } else if (game.phase === PHASES.ESCAPING) {
                phaseDisplay.className += ' phase2';
                phaseDisplay.textContent = '🤫 PHASE 2: BLEIB IM PFERD!';
                document.getElementById('objective').textContent = 'Bleib im grünen Kreis! Die Wachen können dich nicht fangen wenn du drin bist!';
                document.getElementById('guardStatBox').style.display = 'block';
            } else if (game.phase === PHASES.ATTACKING) {
                phaseDisplay.className += ' phase3';
                phaseDisplay.textContent = '⚔️ PHASE 3: ANGRIFF!';
                document.getElementById('objective').textContent = 'Klick auf die Wachen um sie zu besiegen!';
                document.getElementById('guardStatBox').style.display = 'block';
            }
        }

        function endGame(victory, message) {
            gameRunning = false;
            document.getElementById('gameOverOverlay').style.display = 'flex';
            
            if (victory) {
                document.getElementById('gameOverTitle').textContent = '🎉 SIEG! 🎉';
            } else {
                document.getElementById('gameOverTitle').textContent = '💀 GAME OVER 💀';
            }
            
            document.getElementById('gameOverMessage').textContent = message;
            document.getElementById('gameOverScore').textContent = `Punkte: ${game.score}`;
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Start
        createTrees();
        gameLoop();
    </script>
</body>
</html>
