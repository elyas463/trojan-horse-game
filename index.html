<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trojanisches Pferd - Survival</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow: hidden;
        }

        .game-container {
            display: flex;
            height: 100vh;
        }

        #gameCanvas {
            flex: 1;
            background: linear-gradient(135deg, #1a0033 0%, #330000 100%);
            cursor: crosshair;
        }

        .sidebar {
            width: 250px;
            background: #1a1a1a;
            border-left: 3px solid #ffd700;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .sidebar h2 {
            color: #ffd700;
            font-size: 1.2em;
            margin-bottom: 15px;
            border-bottom: 2px solid #ffd700;
            padding-bottom: 10px;
        }

        .stat {
            margin: 10px 0;
            padding: 8px;
            background: rgba(255, 215, 0, 0.1);
            border-left: 3px solid #ffd700;
            border-radius: 3px;
        }

        .stat-label {
            font-size: 0.85em;
            color: #aaa;
        }

        .stat-value {
            font-size: 1.3em;
            color: #ffd700;
            font-weight: bold;
        }

        .upgrades {
            margin-top: 20px;
            flex: 1;
        }

        .upgrade-btn {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            color: #000;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.2s;
        }

        .upgrade-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 215, 0, 0.4);
        }

        .upgrade-btn:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .upgrade-cost {
            font-size: 0.75em;
            opacity: 0.8;
        }

        .wave-info {
            background: rgba(255, 0, 0, 0.1);
            border: 2px solid #ff3333;
            border-radius: 5px;
            padding: 10px;
            margin: 10px 0;
            text-align: center;
        }

        .wave-info.active {
            background: rgba(0, 255, 0, 0.1);
            border-color: #00ff00;
        }

        .game-over-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
        }

        .game-over-content {
            background: rgba(26, 26, 46, 0.95);
            padding: 40px;
            border-radius: 15px;
            border: 3px solid #ffd700;
        }

        .game-over-content h1 {
            font-size: 3em;
            color: #ffd700;
            margin-bottom: 20px;
        }

        .game-over-content p {
            font-size: 1.2em;
            margin: 10px 0;
        }

        .game-over-content button {
            margin-top: 20px;
            padding: 15px 30px;
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            color: #000;
            border: none;
            border-radius: 5px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 150px;
                padding: 10px;
            }

            .sidebar h2 {
                font-size: 1em;
            }

            .stat-value {
                font-size: 1.1em;
            }

            .upgrade-btn {
                font-size: 0.75em;
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
        <div class="sidebar">
            <div>
                <h2>STATS</h2>
                <div class="stat">
                    <div class="stat-label">LEBEN</div>
                    <div class="stat-value" id="healthStat">100</div>
                </div>
                <div class="stat">
                    <div class="stat-label">PUNKTE</div>
                    <div class="stat-value" id="scoreStat">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">WELLE</div>
                    <div class="stat-value" id="waveStat">1</div>
                </div>
                <div class="stat">
                    <div class="stat-label">GOLD</div>
                    <div class="stat-value" id="goldStat">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">FEINDE</div>
                    <div class="stat-value" id="enemyStat">0</div>
                </div>
            </div>

            <div class="wave-info" id="waveInfo">
                Welle 1 startet...
            </div>

            <div class="upgrades">
                <h2>UPGRADES</h2>
                <button class="upgrade-btn" onclick="upgradeAttack()">
                    🔥 Schaden+<br>
                    <span class="upgrade-cost">Gold: <span id="damageGold">50</span></span>
                </button>
                <button class="upgrade-btn" onclick="upgradeFireRate()">
                    ⚡ Schneller Schießen<br>
                    <span class="upgrade-cost">Gold: <span id="fireGold">50</span></span>
                </button>
                <button class="upgrade-btn" onclick="upgradeRange()">
                    📍 Reichweite+<br>
                    <span class="upgrade-cost">Gold: <span id="rangeGold">50</span></span>
                </button>
                <button class="upgrade-btn" onclick="upgradeHealth()">
                    ❤️ Leben+<br>
                    <span class="upgrade-cost">Gold: <span id="healthGold">75</span></span>
                </button>
                <button class="upgrade-btn" onclick="upgradeAutoShoot()">
                    🤖 Auto-Schießen<br>
                    <span class="upgrade-cost">Gold: <span id="autoGold">100</span></span>
                </button>
            </div>
        </div>
    </div>

    <div class="game-over-overlay" id="gameOverOverlay">
        <div class="game-over-content">
            <h1 id="gameOverTitle">SPIEL VORBEI</h1>
            <p id="gameOverScore">Punkte: 0</p>
            <p id="gameOverWave">Welle erreicht: 1</p>
            <p id="gameOverKills">Feinde besiegt: 0</p>
            <button onclick="location.reload()">NOCHMAL SPIELEN</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth - 250;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Game variables
        let gameRunning = true;
        let gameTime = 0;
        let player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            width: 25,
            height: 25,
            speed: 6,
            health: 100,
            maxHealth: 100,
            damage: 10,
            fireRate: 0.1,
            shootCooldown: 0,
            range: 150,
            autoShoot: false,
            kills: 0
        };

        let game = {
            score: 0,
            gold: 0,
            wave: 1,
            waveTime: 0,
            waveMaxTime: 120,
            enemyCount: 0
        };

        let enemies = [];
        let particles = [];
        let mouse = { x: 0, y: 0 };

        // Input
        let keys = {};
        document.addEventListener('keydown', (e) => keys[e.key] = true);
        document.addEventListener('keyup', (e) => keys[e.key] = false);
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
        });
        canvas.addEventListener('click', () => {
            shootInDirection(mouse.x - player.x, mouse.y - player.y);
        });

        // Upgrades
        let upgradeLevels = {
            damage: 0,
            fireRate: 0,
            range: 0,
            health: 0,
            autoShoot: false
        };

        let upgradeCosts = {
            damage: 50,
            fireRate: 50,
            range: 50,
            health: 75,
            autoShoot: 100
        };

        function upgradeAttack() {
            if (game.gold >= upgradeCosts.damage) {
                game.gold -= upgradeCosts.damage;
                player.damage += 5;
                upgradeLevels.damage++;
                upgradeCosts.damage += 25;
                document.getElementById('damageGold').textContent = upgradeCosts.damage;
            }
        }

        function upgradeFireRate() {
            if (game.gold >= upgradeCosts.fireRate) {
                game.gold -= upgradeCosts.fireRate;
                player.fireRate += 0.05;
                upgradeLevels.fireRate++;
                upgradeCosts.fireRate += 25;
                document.getElementById('fireGold').textContent = upgradeCosts.fireRate;
            }
        }

        function upgradeRange() {
            if (game.gold >= upgradeCosts.range) {
                game.gold -= upgradeCosts.range;
                player.range += 30;
                upgradeLevels.range++;
                upgradeCosts.range += 25;
                document.getElementById('rangeGold').textContent = upgradeCosts.range;
            }
        }

        function upgradeHealth() {
            if (game.gold >= upgradeCosts.health) {
                game.gold -= upgradeCosts.health;
                player.maxHealth += 30;
                player.health = player.maxHealth;
                upgradeLevels.health++;
                upgradeCosts.health += 40;
                document.getElementById('healthGold').textContent = upgradeCosts.health;
            }
        }

        function upgradeAutoShoot() {
            if (game.gold >= upgradeCosts.autoShoot && !upgradeLevels.autoShoot) {
                game.gold -= upgradeCosts.autoShoot;
                player.autoShoot = true;
                upgradeLevels.autoShoot = true;
                document.querySelector('.upgrade-btn:nth-child(5)').disabled = true;
            }
        }

        // Spawn enemies
        function spawnWave() {
            const count = 5 + game.wave * 3;
            for (let i = 0; i < count; i++) {
                const angle = (Math.random() * Math.PI * 2);
                const distance = 300 + Math.random() * 100;
                enemies.push({
                    x: player.x + Math.cos(angle) * distance,
                    y: player.y + Math.sin(angle) * distance,
                    width: 15,
                    height: 15,
                    speed: 2 + game.wave * 0.3,
                    health: 1 + game.wave * 0.5,
                    maxHealth: 1 + game.wave * 0.5,
                    type: Math.random() > 0.7 ? 'strong' : 'normal'
                });
            }
            game.enemyCount = enemies.length;
        }

        // Shooting
        function shootInDirection(dx, dy) {
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist === 0) return;

            for (let i = 0; i < 3; i++) {
                const angle = Math.atan2(dy, dx) + (Math.random() - 0.5) * 0.3;
                enemies.forEach((enemy) => {
                    const edx = enemy.x - player.x;
                    const edy = enemy.y - player.y;
                    const eDist = Math.sqrt(edx * edx + edy * edy);
                    
                    if (eDist < player.range) {
                        const eAngle = Math.atan2(edy, edx);
                        const angleDiff = Math.abs(angle - eAngle);
                        
                        if (angleDiff < 0.3 || angleDiff > Math.PI * 2 - 0.3) {
                            enemy.health -= player.damage;
                            if (enemy.health <= 0) {
                                game.score += 10 + game.wave * 5;
                                game.gold += 10 + game.wave * 2;
                                player.kills++;
                                spawnParticles(enemy.x, enemy.y, 5);
                                enemies = enemies.filter(e => e !== enemy);
                                game.enemyCount--;
                            }
                        }
                    }
                });
            }
        }

        // Particles
        function spawnParticles(x, y, count) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 4,
                    vy: (Math.random() - 0.5) * 4,
                    life: 30,
                    maxLife: 30
                });
            }
        }

        // Update
        function update() {
            if (!gameRunning) return;

            gameTime++;
            game.waveTime++;

            // Player movement
            let moveX = 0;
            let moveY = 0;
            if (keys['ArrowUp'] || keys['w']) moveY -= player.speed;
            if (keys['ArrowDown'] || keys['s']) moveY += player.speed;
            if (keys['ArrowLeft'] || keys['a']) moveX -= player.speed;
            if (keys['ArrowRight'] || keys['d']) moveX += player.speed;

            const len = Math.sqrt(moveX * moveX + moveY * moveY);
            if (len > 0) {
                moveX = (moveX / len) * player.speed;
                moveY = (moveY / len) * player.speed;
            }

            player.x = Math.max(10, Math.min(canvas.width - 10, player.x + moveX));
            player.y = Math.max(10, Math.min(canvas.height - 10, player.y + moveY));

            // Auto shoot
            if (player.autoShoot) {
                player.shootCooldown--;
                if (player.shootCooldown <= 0) {
                    let closest = null;
                    let minDist = player.range;
                    
                    enemies.forEach(enemy => {
                        const dx = enemy.x - player.x;
                        const dy = enemy.y - player.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < minDist) {
                            minDist = dist;
                            closest = enemy;
                        }
                    });

                    if (closest) {
                        shootInDirection(closest.x - player.x, closest.y - player.y);
                    }
                    player.shootCooldown = 1 / player.fireRate;
                }
            }

            // Enemy AI
            enemies.forEach(enemy => {
                const dx = player.x - enemy.x;
                const dy = player.y - enemy.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist > 0) {
                    enemy.x += (dx / dist) * enemy.speed;
                    enemy.y += (dy / dist) * enemy.speed;
                }

                // Collision
                if (Math.abs(enemy.x - player.x) < 20 && Math.abs(enemy.y - player.y) < 20) {
                    player.health -= 0.5;
                }
            });

            // Update particles
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                return p.life > 0;
            });

            // Wave progression
            if (game.waveTime > game.waveMaxTime) {
                game.wave++;
                game.waveTime = 0;
                spawnWave();
            }

            // Game over
            if (player.health <= 0) {
                endGame();
            }

            updateUI();
        }

        // Draw
        function draw() {
            ctx.fillStyle = 'rgba(26, 0, 51, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw range indicator
            ctx.strokeStyle = 'rgba(255, 215, 0, 0.2)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.range, 0, Math.PI * 2);
            ctx.stroke();

            // Draw player
            ctx.fillStyle = '#00ff00';
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.width / 2, 0, Math.PI * 2);
            ctx.fill();

            // Draw health bar
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(player.x - 20, player.y - 35, 40, 5);
            ctx.fillStyle = '#00ff00';
            ctx.fillRect(player.x - 20, player.y - 35, (player.health / player.maxHealth) * 40, 5);

            // Draw enemies
            enemies.forEach(enemy => {
                if (enemy.type === 'strong') {
                    ctx.fillStyle = '#ff6600';
                } else {
                    ctx.fillStyle = '#ff0000';
                }
                ctx.fillRect(enemy.x - enemy.width / 2, enemy.y - enemy.height / 2, enemy.width, enemy.height);

                // Enemy health
                ctx.fillStyle = '#ff0000';
                ctx.fillRect(enemy.x - 10, enemy.y - 20, 20, 3);
                ctx.fillStyle = '#00ff00';
                ctx.fillRect(enemy.x - 10, enemy.y - 20, (enemy.health / enemy.maxHealth) * 20, 3);
            });

            // Draw particles
            particles.forEach(p => {
                ctx.fillStyle = `rgba(255, 215, 0, ${p.life / p.maxLife})`;
                ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
            });

            // Draw wave info
            ctx.fillStyle = '#ffd700';
            ctx.font = 'bold 24px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(`WELLE ${game.wave}`, canvas.width / 2, 50);

            // Draw combo
            ctx.font = 'bold 16px Arial';
            ctx.fillText(`Enemies: ${game.enemyCount}`, canvas.width / 2, 80);
        }

        function updateUI() {
            document.getElementById('healthStat').textContent = Math.max(0, Math.floor(player.health));
            document.getElementById('scoreStat').textContent = game.score;
            document.getElementById('waveStat').textContent = game.wave;
            document.getElementById('goldStat').textContent = game.gold;
            document.getElementById('enemyStat').textContent = game.enemyCount;

            const waveInfo = document.getElementById('waveInfo');
            const progress = Math.floor((game.waveTime / game.waveMaxTime) * 100);
            waveInfo.textContent = `Welle ${game.wave}: ${progress}%`;
        }

        function endGame() {
            gameRunning = false;
            document.getElementById('gameOverOverlay').style.display = 'flex';
            document.getElementById('gameOverTitle').textContent = '💀 SPIEL VORBEI 💀';
            document.getElementById('gameOverScore').textContent = `Punkte: ${game.score}`;
            document.getElementById('gameOverWave').textContent = `Welle erreicht: ${game.wave}`;
            document.getElementById('gameOverKills').textContent = `Feinde besiegt: ${player.kills}`;
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Start
        spawnWave();
        gameLoop();
    </script>
</body>
</html>
