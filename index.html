<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trojan Horse Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(0, 0, 0, 0.9);
            border-radius: 15px;
            padding: 40px;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            color: #fff;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        }

        .game-board {
            background: linear-gradient(to bottom, #87ceeb 0%, #e0f6ff 100%);
            border: 3px solid #8b7355;
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 30px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .game-board::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: linear-gradient(to top, #8b7355, transparent);
            pointer-events: none;
        }

        .phase-container {
            text-align: center;
            z-index: 10;
        }

        .phase-title {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }

        .horse {
            font-size: 150px;
            margin: 20px 0;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .soldiers {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .soldier {
            font-size: 40px;
            animation: hide 1s infinite;
        }

        @keyframes hide {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .attack {
            font-size: 60px;
            margin: 20px 0;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: #333;
            border-radius: 15px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #ffd700, #4ecdc4);
            width: 0%;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: bold;
        }

        .status {
            font-size: 1.2em;
            color: #333;
            margin-top: 20px;
            font-weight: bold;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1em;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #666;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #ffd700;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.9em;
            color: #aaa;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.8em;
            color: #ffd700;
            font-weight: bold;
        }

        .game-over {
            text-align: center;
            padding: 30px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 10px;
            border: 3px solid #ffd700;
            margin-bottom: 20px;
        }

        .game-over h2 {
            font-size: 2.5em;
            margin-bottom: 20px;
            color: #ffd700;
        }

        .game-over p {
            font-size: 1.2em;
            margin-bottom: 10px;
        }

        .victory {
            color: #4ecdc4;
        }

        .defeat {
            color: #ff6b6b;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.8em;
            }

            .horse {
                font-size: 100px;
            }

            .phase-title {
                font-size: 1.5em;
            }

            button {
                padding: 10px 20px;
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐴 TROJAN HORSE GAME 🐴</h1>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">PHASE</div>
                <div class="stat-value" id="phaseNum">1/3</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">PROGRESS</div>
                <div class="stat-value" id="progress">0%</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">SOLDIERS INSIDE</div>
                <div class="stat-value" id="soldiersInside">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">ENEMIES DEFEATED</div>
                <div class="stat-value" id="enemiesDefeated">0</div>
            </div>
        </div>

        <div class="game-board" id="gameBoard">
            <div class="phase-container" id="phaseContainer">
                <div class="phase-title" id="phaseTitle">Phase 1: Build the Horse</div>
                <div class="horse">🐴</div>
                <div class="status" id="status">Click "Build" to construct the Trojan Horse!</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button id="actionBtn" onclick="performAction()">BUILD</button>
            <button onclick="resetGame()">RESET</button>
        </div>

        <div id="gameOverScreen" style="display: none;" class="game-over">
            <h2 id="gameOverTitle"></h2>
            <p id="gameOverMessage"></p>
            <button onclick="resetGame()">Play Again</button>
        </div>
    </div>

    <script>
        let gameState = {
            phase: 1,
            progress: 0,
            soldiersInside: 0,
            enemiesDefeated: 0,
            gameOver: false,
            horseBuilt: false,
            sneakProgress: 0,
            attackProgress: 0
        };

        const phases = [
            { title: "Phase 1: Build the Horse", action: "BUILD", description: "Construct a wooden horse to hide soldiers inside!" },
            { title: "Phase 2: Sneak Inside Troy", action: "SNEAK", description: "Infiltrate the city with your hidden soldiers!" },
            { title: "Phase 3: Attack!", action: "ATTACK", description: "Strike from within and defeat the enemy!" }
        ];

        function performAction() {
            if (gameState.gameOver) return;

            if (gameState.phase === 1) {
                buildHorse();
            } else if (gameState.phase === 2) {
                sneakIn();
            } else if (gameState.phase === 3) {
                attack();
            }
        }

        function buildHorse() {
            gameState.progress += 25;
            if (gameState.progress >= 100) {
                gameState.progress = 100;
                gameState.horseBuilt = true;
                document.getElementById('status').textContent = "✅ Horse built! The soldiers are ready to board...";
                document.getElementById('actionBtn').textContent = "PROCEED";
                
                setTimeout(() => {
                    nextPhase();
                }, 1500);
            } else {
                document.getElementById('status').textContent = `🔨 Building... ${gameState.progress}% complete`;
            }
            updateUI();
        }

        function sneakIn() {
            gameState.sneakProgress += 20;
            gameState.soldiersInside += 2;

            if (gameState.sneakProgress >= 100) {
                gameState.sneakProgress = 100;
                document.getElementById('status').textContent = "✅ All soldiers infiltrated! Time to strike!";
                document.getElementById('actionBtn').textContent = "PROCEED";
                
                setTimeout(() => {
                    nextPhase();
                }, 1500);
            } else {
                document.getElementById('status').textContent = `🤫 Sneaking in... Soldiers inside: ${gameState.soldiersInside}`;
            }
            updateUI();
        }

        function attack() {
            gameState.attackProgress += 25;
            gameState.enemiesDefeated += 5;

            if (gameState.attackProgress >= 100) {
                gameState.attackProgress = 100;
                endGame(true);
            } else {
                document.getElementById('status').textContent = `⚔️ ATTACKING! Enemies defeated: ${gameState.enemiesDefeated}`;
            }
            updateUI();
        }

        function nextPhase() {
            if (gameState.phase < 3) {
                gameState.phase++;
                gameState.progress = 0;
                updatePhaseDisplay();
                document.getElementById('actionBtn').textContent = phases[gameState.phase - 1].action;
            }
        }

        function updatePhaseDisplay() {
            const phase = phases[gameState.phase - 1];
            document.getElementById('phaseTitle').textContent = phase.title;
            document.getElementById('status').textContent = phase.description;

            const phaseContainer = document.getElementById('phaseContainer');
            
            if (gameState.phase === 1) {
                phaseContainer.innerHTML = `
                    <div class="phase-title">${phase.title}</div>
                    <div class="horse">🐴</div>
                    <div class="status" id="status">${phase.description}</div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                `;
            } else if (gameState.phase === 2) {
                phaseContainer.innerHTML = `
                    <div class="phase-title">${phase.title}</div>
                    <div class="horse">🐴</div>
                    <div class="soldiers" id="soldierDisplay"></div>
                    <div class="status" id="status">${phase.description}</div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                `;
            } else if (gameState.phase === 3) {
                phaseContainer.innerHTML = `
                    <div class="phase-title">${phase.title}</div>
                    <div class="attack">⚔️</div>
                    <div class="soldiers" id="enemyDisplay"></div>
                    <div class="status" id="status">${phase.description}</div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                `;
            }
            updateUI();
        }

        function updateUI() {
            let currentProgress = gameState.progress;
            if (gameState.phase === 2) currentProgress = gameState.sneakProgress;
            if (gameState.phase === 3) currentProgress = gameState.attackProgress;

            document.getElementById('phaseNum').textContent = `${gameState.phase}/3`;
            document.getElementById('progress').textContent = `${currentProgress}%`;
            document.getElementById('soldiersInside').textContent = gameState.soldiersInside;
            document.getElementById('enemiesDefeated').textContent = gameState.enemiesDefeated;
            document.getElementById('progressFill').style.width = currentProgress + '%';
            document.getElementById('progressFill').textContent = currentProgress + '%';

            if (gameState.phase === 2) {
                const soldierDisplay = document.getElementById('soldierDisplay');
                if (soldierDisplay) {
                    soldierDisplay.innerHTML = '👨‍🪖 '.repeat(Math.floor(gameState.soldiersInside / 2));
                }
            } else if (gameState.phase === 3) {
                const enemyDisplay = document.getElementById('enemyDisplay');
                if (enemyDisplay) {
                    const remaining = Math.max(0, 20 - gameState.enemiesDefeated);
                    enemyDisplay.innerHTML = '👹 '.repeat(remaining);
                }
            }
        }

        function endGame(victory) {
            gameState.gameOver = true;
            document.getElementById('gameOverScreen').style.display = 'block';
            document.getElementById('gameBoard').style.opacity = '0.5';
            
            if (victory) {
                document.getElementById('gameOverTitle').textContent = '🎉 VICTORY! 🎉';
                document.getElementById('gameOverTitle').className = 'victory';
                document.getElementById('gameOverMessage').textContent = 
                    `You successfully defeated ${gameState.enemiesDefeated} enemies!\nThe Trojan Horse strategy worked perfectly!`;
            } else {
                document.getElementById('gameOverTitle').textContent = '💀 DEFEAT 💀';
                document.getElementById('gameOverTitle').className = 'defeat';
                document.getElementById('gameOverMessage').textContent = 'Your plan failed! Try again!';
            }
        }

        function resetGame() {
            gameState = {
                phase: 1,
                progress: 0,
                soldiersInside: 0,
                enemiesDefeated: 0,
                gameOver: false,
                horseBuilt: false,
                sneakProgress: 0,
                attackProgress: 0
            };
            
            document.getElementById('gameBoard').style.opacity = '1';
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('actionBtn').textContent = 'BUILD';
            
            updatePhaseDisplay();
        }

        // Initialize
        updatePhaseDisplay();
    </script>
</body>
</html>
